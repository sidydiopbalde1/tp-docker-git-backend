services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sididiop
      POSTGRES_PASSWORD: Toubakhayra
      POSTGRES_DB: tasksdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sididiop -d tasksdb"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://sididiop:Toubakhayra@postgres:5432/tasksdb
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: